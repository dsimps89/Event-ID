<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verifying purchase — LUMEN V2</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050817;color:#fff;font:16px system-ui}.box{width:min(520px,90vw);padding:30px;border:1px solid #315984;border-radius:22px;background:#0b1730;text-align:center}h1{color:#72ffd1}.spin{width:42px;height:42px;border:4px solid #24456b;border-top-color:#3de5ff;border-radius:50%;margin:20px auto;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}a{color:#3de5ff}</style></head><body><main class="box"><h1>Verifying payment</h1><div class="spin"></div><p id="status">Confirming the completed checkout with the payment server…</p></main><script>const id=new URLSearchParams(location.search).get('session_id');const s=document.getElementById('status');if(!id){s.innerHTML='No checkout session was supplied. <a href="/">Return to purchase page</a>.'}else fetch('/api/verify-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:id})}).then(async r=>{const d=await r.json();if(!r.ok)throw new Error(d.error||'Verification failed');s.textContent='Payment verified. Opening LUMEN V2…';setTimeout(()=>location.href=d.redirect||'/app',650)}).catch(e=>{s.innerHTML=`${e.message} <a href="/">Return to purchase page</a>.`})</script></body></html>
